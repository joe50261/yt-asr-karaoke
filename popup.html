<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Caption Karaoke</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px 16px;
        font: 13px/1.5 Roboto, Arial, sans-serif;
        color: #0f0f0f;
        background: #fff;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      .sub {
        margin: 0 0 12px;
        color: #606060;
        font-size: 12px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 0;
        border-top: 1px solid #eee;
      }
      .row label {
        font-weight: 600;
      }
      .row .desc {
        display: block;
        font-weight: 400;
        color: #606060;
        font-size: 11px;
        margin-top: 2px;
      }
      input[type='number'] {
        width: 56px;
        padding: 4px 6px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font: inherit;
        text-align: right;
      }
      .switch {
        position: relative;
        width: 38px;
        height: 22px;
        flex: 0 0 auto;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 22px;
        transition: 0.15s;
        cursor: pointer;
      }
      .slider::before {
        content: '';
        position: absolute;
        height: 16px;
        width: 16px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.15s;
      }
      .switch input:checked + .slider {
        background: #065fd4;
      }
      .switch input:checked + .slider::before {
        transform: translateX(16px);
      }
      .hint {
        background: #f2f2f2;
        border-radius: 6px;
        padding: 8px 10px;
        color: #444;
        font-size: 11px;
        margin-top: 12px;
      }
      code {
        background: #e8e8e8;
        border-radius: 3px;
        padding: 0 3px;
      }
    </style>
  </head>
  <body>
    <h1>YouTube Caption Karaoke</h1>
    <p class="sub">Auto-caption karaoke with real per-word highlighting.</p>

    <div class="row">
      <label for="dualTrack">
        Bilingual (dual-track)
        <span class="desc">When an auto-translation is on, show original + translation.</span>
      </label>
      <label class="switch">
        <input type="checkbox" id="dualTrack" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <label for="maxLineWords">
        Words per line
        <span class="desc">Wrap a karaoke line after this many words (same count for both languages).</span>
      </label>
      <input type="number" id="maxLineWords" min="3" max="40" step="1" />
    </div>

    <p class="hint">
      Toggle the overlay with the <strong>Karaoke: ON/OFF</strong> button in the
      player. Dual-track needs both tracks loaded — select
      <code>自動產生</code> once, then <code>自動翻譯</code>.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
