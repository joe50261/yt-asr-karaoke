<!doctype html>
<meta charset="utf-8" />
<title>YouTube watch (stub for e2e-a)</title>
<!-- 控制夾具：餵一個最小的 #movie_player，暴露 auto-translate 需要的 player API。
     讓真擴充的 content scripts 注入後，yk-yt/yk-panel 能讀到確定性的 translationLanguages。 -->
<div id="movie_player"></div>
<video class="html5-main-video"></video>
<script>
  const player = document.getElementById('movie_player');
  const TLS = [
    { languageCode: 'zh-Hant', languageName: '中文（繁體）' },
    { languageCode: 'ja', languageName: '日文' },
  ];
  const ASR = { kind: 'asr', languageCode: 'en' };
  player.getOption = (mod, key) => {
    if (key === 'translationLanguages') return TLS;
    if (key === 'tracklist') return [ASR];
    if (key === 'track') return null;
    return null;
  };
  player.setOption = () => {};
  player.getPlayerResponse = () => ({
    // videoDetails 必填：yk-yt.getPlayerResponse 以 videoId 對 URL 驗明正身
    //（真 YouTube 的 response 一定帶；缺了會被當導航殘留拒用）。
    videoDetails: { videoId: 'stub' },
    captions: { playerCaptionsTracklistRenderer: { captionTracks: [ASR] } },
  });
  window.ytInitialPlayerResponse = player.getPlayerResponse();
</script>
